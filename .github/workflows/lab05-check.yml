name: Lab 05 - Compose Readiness Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compose-check:
    name: Validate Docker Compose Stack
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. Checkout source
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2. Cài Node.js + Newman để chạy Postman test
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman + HTML reporter
        run: npm install -g newman newman-reporter-htmlextra

      # 3. Tạo .env từ .env.example (không dùng secret thật)
      - name: Create .env from example
        run: cp .env.example .env

      # 4. Lint docker-compose.yml (kiểm tra cú pháp)
      - name: Lint docker-compose.yml
        run: docker compose config --quiet

      # 5. Build & start stack (không dùng --wait vì curl không có sẵn trong slim image)
      - name: Build and start Compose stack
        run: docker compose up -d --build

      # 6. Đợi API /health trả 200 (retry loop, dùng curl của host Ubuntu)
      - name: Wait for API /health (port 8000)
        run: |
          echo "Waiting for API to be healthy..."
          for i in $(seq 1 24); do
            if curl -fsS http://localhost:8000/health; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Attempt $i/24 - not ready yet, sleeping 5s..."
            sleep 5
          done
          echo "--- API logs ---"
          docker compose logs api
          exit 1

      # 7. Smoke test AI /health
      - name: Wait for AI service /health (port 9000)
        run: |
          echo "Waiting for AI service to be healthy..."
          for i in $(seq 1 24); do
            if curl -fsS http://localhost:9000/health; then
              echo "AI service is healthy!"
              exit 0
            fi
            echo "Attempt $i/24 - not ready yet, sleeping 5s..."
            sleep 5
          done
          echo "--- AI service logs ---"
          docker compose logs ai-service
          exit 1

      # 8. Test DB readiness (pg_isready)
      - name: Test DB readiness (pg_isready)
        run: |
          PGUSER=$(grep '^POSTGRES_USER=' .env | cut -d= -f2)
          PGUSER="${PGUSER:-lab05}"
          echo "Checking pg_isready for user: $PGUSER"
          docker compose exec -T db pg_isready -U "$PGUSER"

      - name: Show running containers
        run: docker compose ps

      # 9. Chạy Newman test nếu có collection
      - name: Run Newman collection
        run: |
          mkdir -p reports
          COLLECTION=$(find postman -maxdepth 3 -name "*.postman_collection.json" | head -n 1)
          ENVIRONMENT=$(find postman/environments -maxdepth 2 -name "*.postman_environment.json" | head -n 1)

          if [ -z "$COLLECTION" ]; then
            echo "::warning::Không tìm thấy Postman collection - bỏ qua bước Newman"
            exit 0
          fi

          echo "Collection: $COLLECTION"
          [ -n "$ENVIRONMENT" ] && echo "Environment: $ENVIRONMENT"

          newman run "$COLLECTION" \
            ${ENVIRONMENT:+-e "$ENVIRONMENT"} \
            -r cli,junit,htmlextra \
            --reporter-junit-export reports/newman-lab05-compose.xml \
            --reporter-htmlextra-export reports/newman-lab05-compose.html

      # 10. Kiểm tra readiness checklist (tối thiểu 6 mục đã tick)
      - name: Verify readiness checklist
        run: |
          CHECKLIST="checklists/readiness-checklist.md"
          if [ ! -f "$CHECKLIST" ]; then
            echo "::error::Thiếu file $CHECKLIST"
            exit 1
          fi

          CHECKED=$(grep -cE '^\s*-\s*\[[xX]\]' "$CHECKLIST" || true)

          echo "Readiness checklist: ${CHECKED:-0} mục đã tick"

          if [ "${CHECKED:-0}" -lt 6 ]; then
            echo "::error::Lab yêu cầu tối thiểu 6 mục readiness, hiện có ${CHECKED:-0}"
            exit 1
          fi

          echo "✅ Checklist OK: ${CHECKED} mục đã tick"

      # 11. Upload report làm artifact
      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
          if-no-files-found: warn

      # 12. Dump log khi fail để debug
      - name: Dump Compose logs on failure
        if: failure()
        run: docker compose logs

      # 13. Cleanup
      - name: Tear down Compose stack
        if: always()
        run: docker compose down -v
